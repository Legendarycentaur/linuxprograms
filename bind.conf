# -----------------------------------------------------
# OMARCH STYLE CONFIGURATION
# Philosophy: Super Key + Arrows (No Vim Keys)
# -----------------------------------------------------

# -- 1. System & Essentials --
# Reload Configuration
bind=SUPER,r,reload_config

# Terminal (Standard: Super + Enter)
bind=SUPER,Return,spawn,ghostty

# Launcher / Menu (Standard: Super + D)
bind=SUPER,space,spawn,dms ipc call spotlight toggle

# Kill Window (Standard: Super + W)
bind=SUPER,w,killclient

# Exit MangoWC (Logout)
#bind=SUPER+SHIFT,e,quit

# Lock Screen
bind=SUPER,l,spawn,dms ipc call lock lock

# Show Power Menu
bind=SUPER,Escape,spawn,dms ipc call powermenu toggle


# -- 2. Window Focus (The Arrow Keys) --
# Navigate windows using Super + Arrows
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Focus Switching alternatives
bind=ALT,Tab,focusstack,next
bind=SUPER,Tab,focusstack,next

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# -- 3. Moving Windows --
# Move the actual window using Super + Shift + Arrows
bind=SUPER+CTRL+SHIFT,Up,movewin,+0,-50
bind=SUPER+CTRL+SHIFT,Down,movewin,+0,+50
bind=SUPER+CTRL+SHIFT,Left,movewin,-50,+0
bind=SUPER+CTRL+SHIFT,Right,movewin,+50,+0


# -- 4. Resizing Windows --
# Resize using Super + Ctrl + Arrows
bind=SUPER+CTRL,Left,resizewin,-50,+0
bind=SUPER+CTRL,Right,resizewin,+50,+0
bind=SUPER+CTRL,Up,resizewin,+0,-50
bind=SUPER+CTRL,Down,resizewin,+0,+50


# -- 5. Window States --
bind=SUPER,t,togglefullscreen
bind=SUPER,f,togglefloating
bind=SUPER,m,togglemaximizescreen
bind=SUPER,o,toggleoverlay
bind=SUPER,s,toggle_scratchpad


# -- 6. Workspaces (Standardized) --
# Super + Number = Go to Workspace
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Super + Shift + Number = Move Window to Workspace
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0


# -- 7. Monitor Switch --
# Move focus between monitors (Super + Alt + Arrows)
bind=SUPER+ALT,Left,focusmon,left
bind=SUPER+ALT,Right,focusmon,right
bind=SUPER+ALT,Up,focusmon,up
bind=SUPER+ALT,Down,focusmon,down


# -- 8. Layouts & Gaps --
bind=SUPER,t,setlayout,tile
bind=SUPER,y,setlayout,scroller
bind=SUPER,n,switch_layout
bind=SUPER,g,togglegaps


# -- 9. Hardware (Volume & Brightness) --
# Preserved your custom 'dms' calls
bind=none,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
bind=none,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3
bind=none,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 5
bind=none,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 5

# Alternative manual keys (Ctrl + Comma/Period)
bind=CTRL,comma,spawn,dms ipc call brightness decrement 2 ""
bind=CTRL,period,spawn,dms ipc call brightness increment 2 ""
bind=ALT,comma,spawn,dms ipc call audio decrement 3
bind=ALT,period,spawn,dms ipc call audio increment 3


# -- 10. Mouse Bindings --
# Move/Resize with Super + Mouse Click
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER,btn_middle,togglefloating

# -- 11. Custom Apps & Screenshots --
bind=SUPER+SHIFT,B,spawn,zen
bind=SUPER+.,,wofi --show dmenu
bind=SUPER+SHIFT,T,spawn,ghostty -e btop
bind=SUPER+SHIFT,F,spawn,ghostty -e yazi
# Screenshot (Super + Shift + S) - Standard location
bind=SUPER+SHIFT,s,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
# Hide Waybar
bind=SUPER+SHIFT,SPACE,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh
#emojis
bind=SUPER,period,spawn,wofi-emoji
