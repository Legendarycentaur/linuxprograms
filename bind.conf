# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,Return,spawn,ghostty
bind=SUPER,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
# bind=Alt,space,spawn,fuzzel

# exit super+m
# bind=SUPER,code:58,quit
bind=SUPER,m,quit
# killclient super+q
# bind=ALT,code:24,killclient,
bind=SUPER,w,killclient


#powermenu
bind=SUPER,Escape,spawn, wlogout -C ~/.config/mango/wlogout/style.css -l  ~/.config/mango/wlogout/layout  -b 6 --protocol layer-shell

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# movewin
bind=SUPER+CTRL+SHIFT,Up,movewin,+0,-50
bind=SUPER+CTRL+SHIFT,Down,movewin,+0,+50
bind=SUPER+CTRL+SHIFT,Left,movewin,-50,+0
bind=SUPER+CTRL+SHIFT,Right,movewin,+50,+0


# resizewin
bind=SUPER+CTRL,Left,resizewin,-50,+0
bind=SUPER+CTRL,Right,resizewin,+50,+0
bind=SUPER+CTRL,Up,resizewin,+0,-50
bind=SUPER+CTRL,Down,resizewin,+0,+50

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
# bind=ALT,backslash,togglefloating,
# bind=ALT,a,togglemaximizescreen,
# bind=ALT,f,togglefullscreen,
# bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
# bind=ALT,z,toggle_scratchpad

bind=SUPER,t,togglefullscreen
bind=SUPER,f,togglefloating
bind=SUPER,m,togglemaximizescreen
bind=SUPER,o,toggleoverlay
bind=SUPER,s,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# tile layout
bind=SUPER,e,incnmaster,1
bind=SUPER,t,incnmaster,-1
bind=ALT,s,zoom,

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,l,setlayout,scroller
bind=SUPER,n,switch_layout

